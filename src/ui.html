    <style>
      @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap");

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #1e1e1e;
        --surf:    #2c2c2c;
        --surf-hi: #383838;
        --border:  #3d3d3d;
        --blue:    #1abcfe;
        --blue-h:  #0aaee6;
        --blue-lo: rgba(26,188,254,.1);
        --green:   #1bc47d;
        --grn-lo:  rgba(27,196,125,.1);
        --grn-bd:  rgba(27,196,125,.35);
        --red:     #f24822;
        --t1:      #e6e6e6;
        --t2:      #8c8c8c;
        --t3:      #555;
        --r:       8px;
        --pad:     16px;
      }

      html, body {
        font-family: "Figtree", system-ui, sans-serif;
        font-size: 12px; line-height: 1.45;
        background: var(--bg); color: var(--t1);
        width: 300px;
        overflow: hidden;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }

      ::-webkit-scrollbar { display: none; }

      .content {
        padding: var(--pad);
        display: flex; flex-direction: column; gap: 0;
      }

      .sec-label {
        font-size: 13px; font-weight: 600; color: var(--t1);
        padding-bottom: 10px;
      }

      .node-card {
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
        margin-bottom: 8px;
        transition: border-color .15s;
      }
      .node-card.assigned { border-color: var(--green); }

      .node-info {
        display: flex; align-items: center; gap: 8px;
        padding: 9px 12px; min-width: 0;
      }
      .node-icon {
        width: 16px; height: 16px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        color: var(--t3);
      }
      .node-card.assigned .node-icon { color: var(--green); }

      .node-name {
        flex: 1; min-width: 0;
        font-size: 12px; color: var(--t3);
        overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      }
      .node-card.assigned .node-name { color: var(--t1); font-weight: 500; }

      .node-sep { height: 1px; background: var(--border); }
      .node-card.assigned .node-sep { background: var(--grn-bd); }

      .node-btn {
        display: flex; align-items: center; justify-content: center; gap: 5px;
        width: 100%; height: 32px;
        background: none; border: none; cursor: pointer;
        font: inherit; font-size: 12px; font-weight: 500;
        color: var(--blue);
        transition: background .1s;
      }
      .node-btn:hover { background: var(--blue-lo); }
      .node-card.assigned .node-btn { color: var(--green); }
      .node-card.assigned .node-btn:hover { background: var(--grn-lo); }

      .divider {
        height: 1px; background: var(--border);
        margin: 14px 0;
      }

      .prop-row {
        display: flex; align-items: center; gap: 12px;
        min-height: 34px;
      }
      .prop-row + .prop-row { margin-top: 8px; }

      .prop-lbl {
        width: 68px; flex-shrink: 0;
        font-size: 12px; font-weight: 400; color: var(--t2);
      }
      .prop-ctrl { flex: 1; min-width: 0; }

      .seg {
        display: flex;
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 3px; gap: 2px;
      }
      .seg-full { width: 100%; margin-bottom: 8px; }
      .seg input[type="radio"] { display: none; }
      .seg label {
        flex: 1;
        display: flex; align-items: center; justify-content: center;
        height: 30px;
        font: inherit; font-size: 12px; font-weight: 500;
        color: var(--t2); border-radius: 6px;
        cursor: pointer; letter-spacing: -0.01em;
        transition: background .12s, color .12s;
      }
      .seg label:hover { background: var(--surf-hi); color: var(--t1); }
      .seg input[type="radio"]:checked + label {
        background: var(--surf-hi);
        color: var(--t1); font-weight: 600;
      }

      .num-wrap {
        display: flex; align-items: center;
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: var(--r);
        height: 32px; overflow: hidden;
        transition: border-color .1s;
      }
      .num-wrap:focus-within { border-color: var(--blue); }
      .num-wrap input[type="number"] {
        flex: 1; height: 100%; padding: 0 10px;
        font: inherit; font-size: 12px;
        color: var(--t1); background: transparent;
        border: none; outline: none; text-align: right;
        -moz-appearance: textfield;
      }
      .num-wrap input::-webkit-inner-spin-button,
      .num-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; }
      .num-unit {
        font-size: 11px; color: var(--t2);
        padding: 0 10px 0 2px; flex-shrink: 0;
      }

      .toggle-row {
        display: flex; align-items: center; gap: 10px;
        background: var(--surf);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 0 12px; height: 40px;
        cursor: pointer;
        transition: background .1s;
      }
      .toggle-row:hover { background: var(--surf-hi); }
      .toggle-lbl { flex: 1; font-size: 12px; color: var(--t1); }
      .fcheck {
        width: 16px; height: 16px; flex-shrink: 0;
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: 4px;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none;
        transition: background .1s, border-color .1s;
      }
      .toggle-row.checked .fcheck { background: var(--blue); border-color: var(--blue); }
      .fcheck svg { display: none; }
      .toggle-row.checked .fcheck svg { display: block; }

      .action-bar {
        padding: 12px var(--pad);
        border-top: 1px solid var(--border);
        background: var(--bg);
      }
      #generate {
        display: flex; align-items: center; justify-content: center;
        width: 100%; height: 36px; border: none;
        border-radius: var(--r);
        background: var(--blue); color: #fff;
        font: inherit; font-size: 13px; font-weight: 600;
        letter-spacing: -0.01em; cursor: pointer;
        transition: background .1s, opacity .1s, transform .08s;
      }
      #generate:hover:not(:disabled) { background: var(--blue-h); }
      #generate:active:not(:disabled) { transform: scale(0.99); }
      #generate:disabled {
        background: var(--surf); color: var(--t3);
        border: 1px solid var(--border); cursor: not-allowed;
      }
      #generate.loading { opacity: .65; cursor: wait; }
    </style>
  </head>
  <body>

    <div class="content">
      <div class="sec-label">Nodes</div>

      <div class="node-card" id="shapeSlot">
        <div class="node-info">
          <div class="node-icon">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <rect x="1.5" y="1.5" width="9" height="9" rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <span class="node-name" id="shapeName">No shape selected</span>
        </div>
        <div class="node-sep"></div>
        <button class="node-btn" id="setShape">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
            <path d="M4.5 1v7M1 4.5h7" stroke="currentColor"
                  stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Set shape
        </button>
      </div>

      <div class="node-card" id="pathSlot">
        <div class="node-info">
          <div class="node-icon">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M1.5 10C3 8 5 4 10.5 2"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="node-name" id="pathName">No path selected</span>
        </div>
        <div class="node-sep"></div>
        <button class="node-btn" id="setPath">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
            <path d="M4.5 1v7M1 4.5h7" stroke="currentColor"
                  stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Set path
        </button>
      </div>

      <div class="divider"></div>

      <div class="sec-label">Distribution</div>

      <div class="seg seg-full">
        <input type="radio" name="mode" id="modeEven" value="even" checked/>
        <label for="modeEven">Even Count</label>
        <input type="radio" name="mode" id="modeFixed" value="fixed"/>
        <label for="modeFixed">Fixed Gap</label>
      </div>

      <div class="prop-row" id="evenSettings">
        <span class="prop-lbl">Count</span>
        <div class="prop-ctrl">
          <div class="num-wrap">
            <input type="number" id="countInput" value="5" min="2" max="500"/>
            <span class="num-unit">items</span>
          </div>
        </div>
      </div>

      <div class="prop-row" id="fixedSettings" style="display:none">
        <span class="prop-lbl">Gap</span>
        <div class="prop-ctrl">
          <div class="num-wrap">
            <input type="number" id="gapInput" value="100" min="1"/>
            <span class="num-unit">px</span>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="sec-label">Options</div>

      <div class="toggle-row checked" id="rotateLabel">
        <span class="toggle-lbl">Rotate to match path tangent</span>
        <div class="fcheck">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 3.5L3.8 6.5L9 1" stroke="white"
                  stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

    </div>

    <div class="action-bar">
      <button id="generate" disabled>Generate Array</button>
    </div>

    <script>
      const state = {
        shapeId: null, pathId: null,
        mode: "even", count: 5, gap: 100,
        rotateToPath: true,
      };

      const setShapeBtn   = document.getElementById("setShape");
      const setPathBtn    = document.getElementById("setPath");
      const generateBtn   = document.getElementById("generate");
      const shapeSlot     = document.getElementById("shapeSlot");
      const pathSlot      = document.getElementById("pathSlot");
      const shapeNameEl   = document.getElementById("shapeName");
      const pathNameEl    = document.getElementById("pathName");
      const evenSettings  = document.getElementById("evenSettings");
      const fixedSettings = document.getElementById("fixedSettings");
      const rotateLabel   = document.getElementById("rotateLabel");

      const countInput    = document.getElementById("countInput");
      const gapInput      = document.getElementById("gapInput");

      let debounceTimer;
      function requestGenerate(isRealTime = true) {
        if (!(state.shapeId && state.pathId)) {
          updateGenerateBtn();
          return;
        }
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          parent.postMessage({ pluginMessage: { type: "generate", ...state, isRealTime } }, "*");
        }, isRealTime ? 50 : 0);
      }

      function updateGenerateBtn() {
        generateBtn.disabled = !(state.shapeId && state.pathId);
      }

      setShapeBtn.onclick = () =>
        parent.postMessage({ pluginMessage: { type: "set-node", target: "shape" } }, "*");
      setPathBtn.onclick = () =>
        parent.postMessage({ pluginMessage: { type: "set-node", target: "path" } }, "*");

      document.querySelectorAll('input[name="mode"]').forEach((r) => {
        r.onchange = (e) => {
          state.mode = e.target.value;
          const isEven = state.mode === "even";
          evenSettings.style.display  = isEven ? "flex" : "none";
          fixedSettings.style.display = isEven ? "none" : "flex";
          requestGenerate();
        };
      });

      countInput.oninput = (e) => {
        state.count = Math.max(2, parseInt(e.target.value) || 2);
        requestGenerate();
      };

      gapInput.oninput = (e) => {
        state.gap = Math.max(1, parseFloat(e.target.value) || 1);
        requestGenerate();
      };

      rotateLabel.onclick = () => {
        state.rotateToPath = !state.rotateToPath;
        rotateLabel.classList.toggle("checked", state.rotateToPath);
        requestGenerate();
      };

      generateBtn.onclick = () => {
        generateBtn.classList.add("loading");
        generateBtn.textContent = "Generating…";
        generateBtn.disabled = true;
        requestGenerate(false);
      };

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;
        if (msg.type === "node-confirmed") {
          if (msg.target === "shape") {
            state.shapeId = msg.id;
            shapeNameEl.textContent = msg.name;
            shapeSlot.classList.add("assigned");
            setShapeBtn.textContent = "Reassign";
          } else {
            state.pathId = msg.id;
            pathNameEl.textContent = msg.name;
            pathSlot.classList.add("assigned");
            setPathBtn.textContent = "Reassign";
          }
          requestGenerate();
        }
        if (msg.type === "done") {
          generateBtn.classList.remove("loading");
          generateBtn.textContent = "Generate Array";
          updateGenerateBtn();
        }
      };
    </script>
  </body>
</html>
